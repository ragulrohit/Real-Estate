<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 Page Not Found</title>
    <link rel="stylesheet" href="./Not found.css" />
  </head>
  <body>
    <main class="not-found" aria-labelledby="error-title">
      <section class="error-copy">
        <h1 id="error-title">404</h1>
        <p>Oops...page not found</p>
        <a class="home-btn" href="./index.html">Back to Home</a>
      </section>

      <section class="robot-scene" aria-label="Broken robot illustration">
        <div class="lamp">
          <span></span>
        </div>
        <div class="spotlight"></div>
        <div class="floor">
          <span class="gear gear-one"></span>
          <span class="gear gear-two"></span>
          <span class="bolt bolt-one"></span>
          <span class="bolt bolt-two"></span>
        </div>
        <div class="robot">
          <div class="head">
            <span class="eye eye-left"></span>
            <span class="eye eye-right"></span>
            <span class="mouth"></span>
            <span class="dent"></span>
          </div>
          <div class="neck"></div>
          <div class="body">
            <span class="panel"></span>
            <span class="wire wire-one"></span>
            <span class="wire wire-two"></span>
          </div>
          <div class="arm arm-left"></div>
          <div class="arm arm-right"></div>
          <div class="hand hand-left"></div>
          <div class="hand hand-right"></div>
          <div class="leg leg-left"></div>
          <div class="leg leg-right"></div>
          <div class="foot foot-left"></div>
          <div class="foot foot-right"></div>
        </div>
      </section>
    </main>
  </body>
</html>
